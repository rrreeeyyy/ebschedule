# 03-schedule-cron-timezone: EventBridge Scheduler basics.
#
# Scheduler is the newer service that supports timezones natively and one-shot
# scheduling. Use it instead of EventBridge Rules with cron expressions when
# you want timezone-aware schedules or "fire once" semantics.
#
# All schedules in this config land in the schedule-group named below; the
# group is auto-created on first apply if it doesn't exist (and tagged with
# the trackingId so prune is scoped to it).

region: ap-northeast-1
trackingId: examples-03
groupName: examples-cron
tags:
  Owner: examples
  Service: reports

schedules:
  # Daily 09:00 JST -> Lambda. EventBridge Rules can't do timezone like this.
  - name: daily-report-jst
    description: Send daily report at 09:00 Asia/Tokyo
    scheduleExpression: cron(0 9 * * ? *)
    timezone: Asia/Tokyo
    state: ENABLED
    flexibleTimeWindow:
      mode: OFF
    target:
      arn: arn:aws:lambda:ap-northeast-1:{{ must_env "AWS_ACCOUNT_ID" }}:function:daily-report
      roleArn: arn:aws:iam::{{ must_env "AWS_ACCOUNT_ID" }}:role/SchedulerInvokeLambda
      retryPolicy:
        maximumRetryAttempts: 3
        maximumEventAgeInSeconds: 3600

  # One-shot fire-and-forget: runs once at the given time, then auto-deletes.
  - name: one-shot-migration
    scheduleExpression: at(2026-06-01T03:00:00)
    timezone: Asia/Tokyo
    actionAfterCompletion: DELETE
    flexibleTimeWindow:
      mode: OFF
    target:
      arn: arn:aws:lambda:ap-northeast-1:{{ must_env "AWS_ACCOUNT_ID" }}:function:run-migration
      roleArn: arn:aws:iam::{{ must_env "AWS_ACCOUNT_ID" }}:role/SchedulerInvokeLambda
