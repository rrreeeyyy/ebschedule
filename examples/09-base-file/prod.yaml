# 09-base-file/prod.yaml: production rules inheriting region / tags from
# _base.yaml. Each child file owns its own resources; only scaffolding is
# shared.

baseFile: _base.yaml
trackingId: my-app-prod
tags:
  Env: prod

rules:
  - name: my-app-prod-nightly
    scheduleExpression: cron(0 18 * * ? *)
    state: ENABLED
    targets:
      - id: ecs
        arn: arn:aws:ecs:ap-northeast-1:{{ must_env "AWS_ACCOUNT_ID" }}:cluster/shared-cluster
        roleArn: arn:aws:iam::{{ must_env "AWS_ACCOUNT_ID" }}:role/ecsEventsRole
        ecsParameters:
          taskDefinitionArn: arn:aws:ecs:ap-northeast-1:{{ must_env "AWS_ACCOUNT_ID" }}:task-definition/my-app-prod-batch
          launchType: FARGATE
          subnets: [subnet-aaa, subnet-bbb]
          securityGroups: [sg-egress]
          assignPublicIp: DISABLED
