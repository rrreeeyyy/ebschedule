# 09-base-file/staging.yaml: staging variant of the same app, inheriting
# the same _base.yaml. Only the env-specific bits differ; the cluster /
# region / account / Service tag come from _base.yaml.

baseFile: _base.yaml
trackingId: my-app-stg
tags:
  Env: stg
cluster: stg-cluster              # override the inherited cluster

rules:
  - name: my-app-stg-nightly
    scheduleExpression: cron(0 18 * * ? *)
    state: DISABLED               # staging usually keeps batches off
    targets:
      - id: ecs
        roleArn: ecsEventsRole
        ecsParameters:
          taskDefinitionArn: my-app-stg-batch
          launchType: FARGATE
          subnets: [subnet-stg]
          securityGroups: [sg-egress]
          assignPublicIp: DISABLED
