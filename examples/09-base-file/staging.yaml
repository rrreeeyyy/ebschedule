# 09-base-file/staging.yaml: staging variant of the same app, inheriting
# region / Service tag from _base.yaml. Env-specific bits stay in the
# child.

baseFile: _base.yaml
trackingId: my-app-stg
tags:
  Env: stg

rules:
  - name: my-app-stg-nightly
    scheduleExpression: cron(0 18 * * ? *)
    state: DISABLED               # staging usually keeps batches off
    targets:
      - id: ecs
        arn: arn:aws:ecs:ap-northeast-1:{{ must_env "AWS_ACCOUNT_ID" }}:cluster/stg-cluster
        roleArn: arn:aws:iam::{{ must_env "AWS_ACCOUNT_ID" }}:role/ecsEventsRole
        ecsParameters:
          taskDefinitionArn: arn:aws:ecs:ap-northeast-1:{{ must_env "AWS_ACCOUNT_ID" }}:task-definition/my-app-stg-batch
          launchType: FARGATE
          subnets: [subnet-stg]
          securityGroups: [sg-egress]
          assignPublicIp: DISABLED
