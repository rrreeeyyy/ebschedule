name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default to read-only; release.yml escalates to write where needed.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt issues:"
            echo "$out"
            exit 1
          fi
      # Match the build tags used by goreleaser so CI exercises the same
      # compilation surface release builds will (tfstate-lookup GCS / Azure
      # backends excluded; S3 + local + http + TFE retained).
      - run: go vet -tags=no_gcs,no_azurerm ./...
      - run: go build -tags=no_gcs,no_azurerm ./...
      - run: go test -tags=no_gcs,no_azurerm ./... -race -count=1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # Share the module / build cache with the test job so the
          # second-to-finish workflow doesn't re-download every dep.
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          # Pin to a specific version so reruns of an old commit stay
          # reproducible and a tool-side breaking change can't surprise CI.
          version: v2.5.0

  # PRs only build a single target snapshot (~30s) — enough to catch
  # goreleaser config drift without paying for 6 platforms of cross-build
  # on every push. Full archive matrix runs on main push (job below) and
  # on tag push via release.yml, which is where it actually matters.
  goreleaser-check-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: build --single-target --snapshot --clean

  goreleaser-check-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --snapshot --clean --skip=publish
