version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: ebschedule
    main: .
    binary: ebschedule
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
      # tfstate-lookup brings GCS / Azurerm backends by default. Most
      # ebschedule users won't need them; cut them out to slim the binary
      # (~46MB -> ~30MB). S3 + local + http + Terraform Cloud (tfe) stay.
      - -tags=no_gcs,no_azurerm
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    # Reproducible builds: stamp binaries with the commit timestamp so
    # rebuilds of the same tag are byte-identical.
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: ebschedule
    # Use zip for windows users; tar.gz everywhere else.
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

# Print binary size deltas in the build log; useful in CI runs.
report_sizes: true

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot+{{ .ShortCommit }}"

release:
  github:
    owner: rrreeeyyy
    name: ebschedule
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      # Drop boring chores but keep dependency bumps in the changelog
      # (they may carry CVE fixes or feature unlocks).
      - '^chore(?!\(deps\)):'
      - 'Merge pull request'
