version: "2"

linters:
  default: standard
  enable:
    - misspell
    - revive
  settings:
    errcheck:
      # fmt.Fprint* into our output writer (typically os.Stdout) cannot
      # meaningfully fail at runtime, and a CLI tool can't recover even if
      # it did. Skip the boilerplate _, _ = ... pattern site-wide.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    revive:
      rules:
        # Field/type names mirror the AWS SDK (RoleArn, TaskDefinitionArn,
        # EcsParameters) rather than RoleARN / TaskDefinitionARN /
        # ECSParameters so YAML round-trips cleanly with our own dump
        # output. Disable var-naming rather than auditing every identifier.
        - name: var-naming
          disabled: true
